name: Update World Cup schedule

on:
  schedule:
    # Offset from minute 0 to avoid GitHub Actions schedule congestion.
    - cron: "7-59/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-world-cup-schedule
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run update
        env:
          PUBLIC_CANONICAL_HOST: ${{ vars.PUBLIC_CANONICAL_HOST || '2026-fifa-world-cup.example.com' }}
      - name: Commit schedule changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update world cup schedule"

name: Update World Cup schedule

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run update
        env:
          PUBLIC_CANONICAL_HOST: ${{ vars.PUBLIC_CANONICAL_HOST || '2026-fifa-world-cup.example.com' }}
      - name: Commit schedule changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update world cup schedule"
